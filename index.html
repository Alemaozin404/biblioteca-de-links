<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ GOD DEV | VAULT SUPREMO V19 - TITAN ELITE</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
/* ---------------------------------------------------------------------------------------------------------------------------------------------
          1. SISTEMA DE CORES V19 - TITAN ELITE
       --------------------------------------------------------------------------------------------------------------------------------------------- */
:root { 
--bg: #000814; 
--acc: #00b4d8; 
--surf: rgba(0, 29, 61, 0.98); 
--txt: #caf0f8; 
--border: #003566; 
--grad: linear-gradient(135deg, #0077b6, #00b4d8);
--danger: #ff4d6d;
--success: #00ff88;
--warning: #ffd166;
--glow: 0 0 30px rgba(0, 180, 216, 0.4);
--shadow: 0 10px 40px rgba(0,0,0,0.5);
--transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Tema Matrix Pro (Padrão) */
.theme-matrix { 
--bg: #000814; --acc: #00b4d8; --surf: rgba(0, 29, 61, 0.98); 
--txt: #caf0f8; --border: #003566; --grad: linear-gradient(135deg, #0077b6, #00b4d8);
}

/* Tema Clean Dark */
.theme-oficial { 
--bg: #0d1117; --acc: #58a6ff; --surf: rgba(22, 27, 34, 0.98); 
--txt: #c9d1d9; --border: #30363d; --grad: linear-gradient(45deg, #58a6ff, #a371f7);
}

/* Tema Royal Gold */
.theme-gold { 
--bg: #0f0f0f; --acc: #d4af37; --surf: rgba(30, 30, 30, 0.98); 
--txt: #f1f1f1; --border: #aa841e; --grad: linear-gradient(45deg, #d4af37, #f9e29c);
}

/* Tema Cyberpunk 2077 */
.theme-cyberpunk { 
--bg: #0d0221; --acc: #ff007f; --surf: rgba(25, 14, 58, 0.98); 
--txt: #00f0ff; --border: #5a189a; --grad: linear-gradient(45deg, #ff007f, #00f0ff);
}

/* Tema Ruby Blood */
.theme-ruby { 
--bg: #1a0505; --acc: #e63946; --surf: rgba(45, 10, 10, 0.98); 
--txt: #f1faee; --border: #a8222e; --grad: linear-gradient(45deg, #e63946, #ff6b6b);
}

/* Tema Neon Pulse */
.theme-neon { 
--bg: #0a0a0a; --acc: #39ff14; --surf: rgba(20, 20, 20, 0.98); 
--txt: #e0e0e0; --border: #39ff14; --grad: linear-gradient(45deg, #39ff14, #00ffff);
}

/* Tema Sunset */
.theme-sunset { 
--bg: #1a0a0a; --acc: #ff6b35; --surf: rgba(40, 20, 15, 0.98); 
--txt: #ffe4c4; --border: #8b4513; --grad: linear-gradient(45deg, #ff6b35, #f7c59f);
}

/* Tema Aurora */
.theme-aurora { 
--bg: #0a0a1a; --acc: #7b68ee; --surf: rgba(20, 20, 40, 0.98); 
--txt: #e6e6fa; --border: #4b0082; --grad: linear-gradient(45deg, #7b68ee, #00ced1);
}

/* Tema Matrix Green */
.theme-matrix-green { 
--bg: #000000; --acc: #00ff00; --surf: rgba(0, 20, 0, 0.98); 
--txt: #00ff00; --border: #003300; --grad: linear-gradient(45deg, #00ff00, #88ff88);
font-family: 'JetBrains Mono', monospace !important;
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          2. RESET E ESTRUTURA
       --------------------------------------------------------------------------------------------------------------------------------------------- */
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
background: var(--bg); 
color: var(--txt); 
font-family: 'Orbitron', 'JetBrains Mono', monospace;
display: flex; 
height: 100vh; 
width: 100vw;
overflow: hidden; 
transition: background 0.5s ease;
}

::selection { background: var(--acc); color: #000; }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          3. NEBULA CANVAS - MELHORADO
       --------------------------------------------------------------------------------------------------------------------------------------------- */
#nebula-canvas {
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
z-index: 0; pointer-events: none; opacity: 0.5;
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          4. SIDEBAR (SCRAPBOOK & ACCESS LOG)
       --------------------------------------------------------------------------------------------------------------------------------------------- */
#scrapbook { 
width: 350px; 
background: var(--surf); 
border-right: 1px solid var(--border); 
padding: 25px; 
display: flex; 
flex-direction: column; 
z-index: 100;
backdrop-filter: blur(30px);
box-shadow: 15px 0 50px rgba(0,0,0,0.6);
transition: var(--transition);
}

#scrapbook:hover { box-shadow: 20px 0 60px rgba(0,0,0,0.7); }

#scrapbook h3 { 
color: var(--acc); font-size: 0.75rem; letter-spacing: 3px; 
margin-bottom: 20px; border-left: 4px solid var(--acc); padding-left: 12px;
text-transform: uppercase;
}

#notes { 
flex: 1; background: rgba(0,0,0,0.4); color: var(--txt); 
border: 1px solid var(--border); padding: 20px; font-family: inherit; 
resize: none; outline: none; border-radius: 12px; font-size: 0.9rem; 
line-height: 1.7; transition: var(--transition);
}
#notes:focus { border-color: var(--acc); box-shadow: 0 0 20px rgba(0,255,100,0.1), inset 0 0 10px rgba(0,255,100,0.05); }

#access-log {
margin-top: 20px; height: 100px; font-size: 0.6rem; color: var(--acc);
overflow-y: auto; background: rgba(0,0,0,0.3); padding: 12px;
border-radius: 8px; border: 1px solid var(--border); opacity: 0.8;
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          5. MAIN CONTENT & HEADER
       --------------------------------------------------------------------------------------------------------------------------------------------- */
main { 
flex: 1; padding: 40px; overflow-y: auto; position: relative; 
z-index: 10; scroll-behavior: smooth;
}

header { 
border-bottom: 3px solid var(--acc); padding-bottom: 25px; 
margin-bottom: 40px; display: flex; justify-content: space-between; align-items: center;
transition: var(--transition);
}

.main-title-container { display: flex; align-items: center; gap: 20px; }

#main-title { 
font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;
background: var(--grad);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-size: 200% 200%;
animation: gradientFlow 3s ease infinite, titleGlow 3s ease-in-out infinite;
}

@keyframes gradientFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

@keyframes titleGlow {
0%, 100% { filter: brightness(1); }
50% { filter: brightness(1.2); }
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          6. DASHBOARD ANALYTICS
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; margin-bottom: 40px; }

.stat-card { 
background: var(--surf); padding: 30px; border-radius: 20px; 
border: 1px solid var(--border); backdrop-filter: blur(15px);
box-shadow: var(--shadow); position: relative;
transition: var(--transition);
overflow: hidden;
}

.stat-card::before {
content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
transition: 0.5s;
}

.stat-card:hover::before { left: 100%; }
.stat-card:hover { transform: translateY(-5px); box-shadow: var(--glow); }

.stat-card::after {
content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: var(--grad);
}

#totalCounter { 
font-size: 5rem; font-weight: 900; color: var(--acc); 
text-shadow: 0 0 30px var(--acc);
animation: counterPulse 2s ease-in-out infinite;
}

@keyframes counterPulse {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.02); }
}

.storage-container { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 20px; margin-top: 15px; overflow: hidden; }
#storage-bar { height: 100%; width: 0%; background: var(--grad); transition: 1.5s ease-in-out; border-radius: 20px; }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          7. SISTEMA DE ABAS
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.tab-content { display: none; animation: slideUp 0.5s ease-out; }
.tab-content.active { display: block; }

@keyframes slideUp { 
from { opacity: 0; transform: translateY(20px); } 
to { opacity: 1; transform: translateY(0); } 
}

.tab-nav { display: flex; gap: 12px; margin-bottom: 30px; }

.tab-btn { 
padding: 12px 28px; background: transparent; border: 2px solid var(--acc);
color: var(--acc); border-radius: 50px; cursor: pointer; font-weight: 700;
transition: var(--transition); letter-spacing: 1px; font-family: inherit;
}

.tab-btn:hover { background: rgba(0,180,216,0.1); transform: translateY(-2px); }

.tab-btn.active { 
background: var(--acc); color: #000; 
box-shadow: 0 0 25px var(--acc);
animation: activePulse 2s infinite;
}

@keyframes activePulse {
0%, 100% { box-shadow: 0 0 25px var(--acc); }
50% { box-shadow: 0 0 35px var(--acc); }
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          8. SISTEMA DE ARQUIVOS TXT
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.txt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

.txt-card { 
background: var(--surf); border: 2px solid var(--border); padding: 25px 20px;
border-radius: 16px; text-align: center; cursor: pointer; transition: var(--transition);
position: relative; overflow: hidden;
}

.txt-card::before {
content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
background: radial-gradient(circle, var(--acc) 0%, transparent 70%);
opacity: 0; transition: var(--transition);
}

.txt-card:hover { 
border-color: var(--acc); 
transform: translateY(-8px); 
background: rgba(255,255,255,0.05);
box-shadow: var(--glow);
}

.txt-card:hover::before { opacity: 0.1; }

.txt-card i { font-size: 3rem; color: var(--acc); margin-bottom: 12px; display: block; }
.txt-card h5 { font-size: 0.9rem; color: var(--txt); font-weight: 700; margin-bottom: 8px; word-break: break-word; }
.txt-card .txt-meta { font-size: 0.55rem; opacity: 0.5; font-family: sans-serif; }

#txt-viewer-overlay {
display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0,0,0,0.98); z-index: 5000; flex-direction: column; padding: 50px;
animation: fadeIn 0.3s ease;
backdrop-filter: blur(10px);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

#txt-editor-area {
flex: 1; background: rgba(0,0,0,0.5); color: var(--acc); border: 2px solid var(--border);
padding: 30px; font-family: 'JetBrains Mono', monospace; font-size: 1rem;
line-height: 1.8; resize: none; outline: none; border-radius: 15px;
transition: var(--transition);
}

#txt-editor-area:focus { border-color: var(--acc); box-shadow: 0 0 20px rgba(0,180,216,0.3); }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          9. INPUT BOX E REGISTROS
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.input-box { 
display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 15px;
background: var(--surf); padding: 30px; border-radius: 20px; border: 1px solid var(--border);
margin-bottom: 30px; backdrop-filter: blur(15px); box-shadow: var(--shadow);
transition: var(--transition);
}

.input-box:hover { box-shadow: 0 15px 50px rgba(0,0,0,0.6); }

.input-field { display: flex; flex-direction: column; gap: 8px; }
.input-field label { font-size: 0.65rem; font-weight: bold; color: var(--acc); opacity: 0.8; letter-spacing: 2px; text-transform: uppercase; }

input, select { 
background: rgba(0,0,0,0.5); border: 1px solid var(--border); padding: 15px;
color: var(--txt); border-radius: 10px; outline: none; font-family: inherit;
transition: var(--transition);
}

input:focus, select:focus { 
border-color: var(--acc); 
box-shadow: 0 0 15px rgba(0,180,216,0.2); 
background: rgba(0,0,0,0.7);
}

.btn-add { 
background: var(--acc); color: #000; border: none; padding: 15px 35px;
font-weight: 900; cursor: pointer; border-radius: 10px; text-transform: uppercase;
transition: var(--transition); font-family: inherit;
}

.btn-add:hover { 
transform: translateY(-3px); 
box-shadow: 0 10px 30px rgba(0,180,216,0.4);
}

.btn-add:active { transform: translateY(0); }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          10. ITENS DA LISTA
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.item { 
background: var(--surf); padding: 25px; border-radius: 14px;
display: flex; justify-content: space-between; align-items: center;
border-left: 6px solid var(--acc); margin-bottom: 15px; transition: var(--transition);
backdrop-filter: blur(10px);
}

.item:hover { 
transform: translateX(10px); 
background: rgba(255,255,255,0.05);
box-shadow: var(--glow);
}

.item-info h4 { color: var(--acc); margin-bottom: 5px; font-weight: 700; }
.item-info p { font-size: 0.75rem; opacity: 0.5; font-family: 'JetBrains Mono', monospace; }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          11. MULTIMÍDIA E MODO ZEN
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.video-section { 
background: var(--surf); padding: 30px; border-radius: 20px; border: 1px solid var(--border);
margin-bottom: 30px; display: none; animation: fadeIn 0.5s;
}

.focus-mode #scrapbook, .focus-mode header, .focus-mode .dashboard-grid, 
.focus-mode .input-box, .focus-mode .search-container, .focus-mode .tab-nav {
display: none !important;
}

.focus-mode main { display: flex; align-items: center; justify-content: center; height: 100vh; }
.focus-mode #nebula-canvas { opacity: 0.8; }

#exit-focus {
display: none; position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
background: rgba(0,0,0,0.9); border: 2px solid var(--acc); color: var(--acc);
padding: 20px 60px; border-radius: 100px; cursor: pointer; z-index: 10000;
font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
transition: var(--transition);
}

#exit-focus:hover { background: var(--acc); color: #000; box-shadow: var(--glow); }
.focus-mode #exit-focus { display: block; animation: fadeIn 0.5s; }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          12. UTILITÁRIOS E BOTÕES
       --------------------------------------------------------------------------------------------------------------------------------------------- */
.btn-tool { 
background: transparent; color: var(--acc); border: 1px solid var(--border);
padding: 10px 18px; cursor: pointer; border-radius: 8px; font-size: 0.7rem;
font-weight: bold; transition: var(--transition); text-transform: uppercase; margin-left: 8px;
font-family: inherit;
}

.btn-tool:hover { 
background: var(--acc); color: #000; 
border-color: var(--acc);
box-shadow: 0 0 20px var(--acc);
}

#qr-modal { 
display:none; position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:6000;
animation: fadeIn 0.3s;
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          13. TOAST NOTIFICATIONS
       --------------------------------------------------------------------------------------------------------------------------------------------- */
#toast-container {
position: fixed; bottom: 30px; right: 30px; z-index: 10001;
display: flex; flex-direction: column; gap: 10px;
}

.toast {
background: var(--surf); border-left: 4px solid var(--acc);
padding: 15px 25px; border-radius: 10px;
box-shadow: var(--shadow); animation: slideInRight 0.3s ease;
min-width: 280px; backdrop-filter: blur(20px);
}

.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }
.toast.warning { border-color: var(--warning); }

@keyframes slideInRight {
from { transform: translateX(100%); opacity: 0; }
to { transform: translateX(0); opacity: 1; }
}

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          14. SCROLLBAR
       --------------------------------------------------------------------------------------------------------------------------------------------- */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--acc); }

/* ---------------------------------------------------------------------------------------------------------------------------------------------
          15. RESPONSIVO AVANÇADO
       --------------------------------------------------------------------------------------------------------------------------------------------- */

/* Tablets Grandes */
@media (max-width: 1200px) {
    .dashboard-grid { grid-template-columns: 1fr; }
    main { padding: 30px; }
}

/* Tablets */
@media (max-width: 1024px) {
    .input-box { grid-template-columns: 1fr 1fr; }
    header { padding-bottom: 20px; margin-bottom: 30px; }
    #main-title { font-size: 1.8rem; }
}

/* Mobile Grande */
@media (max-width: 768px) {
    body { 
        flex-direction: column; 
        height: auto; 
        min-height: 100vh; 
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
    }
    
    /* Sidebar Mobile */
    #scrapbook {
        position: fixed; 
        left: -100%; 
        top: 0; 
        width: 85%; 
        max-width: 320px;
        height: 100vh; 
        transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
        z-index: 9999; 
        padding: 20px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
    }
    #scrapbook.active { left: 0; }
    
    #sidebar-overlay {
        display: none; 
        position: fixed; 
        top: 0; 
        left: 0; 
        width: 100%; 
        height: 100%;
        background: rgba(0,0,0,0.7); 
        z-index: 9998;
        backdrop-filter: blur(3px);
    }
    #sidebar-overlay.active { display: block; }
    
    /* Botão Menu Mobile - Maior e mais acessível */
    .menu-toggle {
        display: flex !important; 
        position: fixed; 
        top: 12px; 
        left: 12px; 
        z-index: 10000;
        background: var(--acc); 
        color: #000; 
        border: none; 
        padding: 14px 18px;
        border-radius: 12px; 
        font-size: 1.3rem; 
        cursor: pointer; 
        box-shadow: var(--glow);
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
    }
    .menu-toggle:active { transform: scale(0.95); }
    
    /* Header Mobile */
    header { 
        flex-direction: column; 
        gap: 12px; 
        padding-bottom: 15px; 
        margin-bottom: 25px; 
        padding-top: 55px; 
    }
    .main-title-container { flex-direction: column; gap: 8px; text-align: center; }
    #main-title { font-size: 1.4rem; }
    
    /* Controls - Botões maiores para toque */
    .controls { 
        display: flex; 
        flex-wrap: wrap; 
        justify-content: center; 
        gap: 6px; 
        padding: 0 10px;
    }
    .btn-tool { 
        font-size: 0.65rem; 
        padding: 10px 12px; 
        margin-left: 4px;
        min-height: 44px; /* Tamanho mínimo para toque */
        touch-action: manipulation;
    }
    
    /* Main Content */
    main { 
        padding: 15px;
        padding-bottom: 80px; /* Espaço para scroll no mobile */
        -webkit-overflow-scrolling: touch;
    }
    
    /* Input Box - Uma coluna */
    .input-box { 
        grid-template-columns: 1fr; 
        gap: 12px; 
        padding: 20px; 
    }
    .btn-add { 
        width: 100%;
        min-height: 50px; /* Botão maior para toque */
        touch-action: manipulation;
    }
    
    /* Dashboard */
    .dashboard-grid { gap: 15px; margin-bottom: 25px; }
    .stat-card { padding: 18px; border-radius: 15px; }
    #totalCounter { font-size: 3rem; }
    .storage-container { height: 10px; }
    
    /* Search */
    .search-container { margin-bottom: 20px; }
    .search-container input {
        min-height: 50px;
        font-size: 1rem;
    }
    
    /* Tabs */
    .tab-nav { 
        gap: 8px; 
        overflow-x: auto;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
    }
    .tab-btn { 
        padding: 12px 20px; 
        font-size: 0.75rem;
        white-space: nowrap;
        min-height: 44px;
    }
    
    /* Grid de Arquivos */
    .txt-grid { 
        grid-template-columns: repeat(2, 1fr); /* 2 colunas no mobile */
        gap: 12px; 
    }
    .txt-card { 
        padding: 15px 10px; 
        min-height: 120px;
    }
    .txt-card i { font-size: 2rem; }
    .txt-card h5 { font-size: 0.8rem; }
    
    /* Itens da Lista */
    .item { 
        flex-direction: column; 
        gap: 12px; 
        padding: 18px; 
        min-height: 80px;
    }
    .item > div:last-child { 
        width: 100%; 
        justify-content: space-between; 
    }
    .item .item-info { width: 100%; }
    .item-info h4 { font-size: 0.95rem; }
    .item-info p { font-size: 0.7rem; }
    
    /* Filtros */
    #filters {
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 10px;
        -webkit-overflow-scrolling: touch;
    }
    #filters .btn-tool {
        min-height: 40px;
        white-space: nowrap;
    }
    
    /* Video Section */
    .video-section { padding: 18px; }
    .video-section input {
        min-height: 50px;
    }
    #player-wrap iframe { height: 250px; }
    
    /* Toast */
    #toast-container { 
        bottom: 15px; 
        right: 15px; 
        left: 15px; 
    }
    .toast { 
        min-width: auto;
        padding: 14px 20px;
    }
    
    /* Txt Viewer */
    #txt-viewer-overlay { padding: 15px; }
    #txt-editor-area { 
        padding: 15px; 
        font-size: 0.9rem;
    }
    
    /* Exit Focus Button */
    #exit-focus {
        padding: 15px 40px;
        font-size: 0.8rem;
        min-height: 50px;
    }
    
    /* Botões de ação maiores */
    .item button, 
    .txt-card button,
    .item i {
        min-height: 44px;
        min-width: 44px;
        touch-action: manipulation;
    }
}

/* Mobile Pequeno */
@media (max-width: 480px) {
    .txt-grid {
        grid-template-columns: 1fr; /* 1 coluna em celulares pequenos */
    }
    
    #main-title { font-size: 1.2rem; }
    
    .btn-tool {
        font-size: 0.6rem;
        padding: 8px 10px;
    }
    
    .stat-card { padding: 15px; }
    #totalCounter { font-size: 2.5rem; }
}

/* Touch optimizations */
@media (hover: none) and (pointer: coarse) {
    /* Para dispositivos touch */
    .btn-tool:hover,
    .btn-add:hover,
    .tab-btn:hover,
    .txt-card:hover,
    .item:hover,
    .stat-card:hover {
        transform: none;
    }
    
    .btn-tool:active,
    .btn-add:active,
    .tab-btn:active {
        transform: scale(0.97);
        opacity: 0.8;
    }
    
    /* Hover effects para touch */
    .txt-card:active {
        border-color: var(--acc);
        transform: scale(0.98);
    }
    
    .item:active {
        background: rgba(255,255,255,0.1);
    }
}

.menu-toggle { display: none; }

/* Login Animation - WOW Effect */
#login-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: var(--bg);
z-index: 99999;
display: flex;
justify-content: center;
align-items: center;
overflow: hidden;
animation: loginFadeOut 0.8s ease 4.5s forwards;
}

.login-particles {
position: absolute;
width: 100%;
height: 100%;
top: 0;
left: 0;
pointer-events: none;
}

.login-particle {
position: absolute;
width: 4px;
height: 4px;
background: var(--acc);
border-radius: 50%;
animation: particleFloat 3s ease-in-out infinite;
box-shadow: 0 0 10px var(--acc), 0 0 20px var(--acc);
}

@keyframes particleFloat {
0%, 100% { transform: translateY(0) scale(1); opacity: 0.8; }
50% { transform: translateY(-100px) scale(0.5); opacity: 0.3; }
}

.login-content {
text-align: center;
animation: loginZoomIn 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
position: relative;
z-index: 10;
}

.login-logo {
font-size: 8rem;
color: var(--acc);
margin-bottom: 20px;
animation: logoWobble 0.6s ease-in-out infinite, logoGlow 2s ease-in-out infinite alternate;
text-shadow: 0 0 30px var(--acc), 0 0 60px var(--acc), 0 0 90px var(--acc), 0 0 120px var(--acc);
position: relative;
}

.login-logo::before {
content: '';
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 150px;
height: 150px;
background: var(--acc);
filter: blur(60px);
opacity: 0.5;
animation: logoPulseBg 2s ease-in-out infinite;
z-index: -1;
border-radius: 50%;
}

@keyframes logoWobble {
0%, 100% { transform: rotate(-5deg) scale(1); }
25% { transform: rotate(5deg) scale(1.05); }
50% { transform: rotate(-5deg) scale(1.1); }
75% { transform: rotate(5deg) scale(1.05); }
}

@keyframes logoGlow {
0% { filter: brightness(1) drop-shadow(0 0 20px var(--acc)); }
100% { filter: brightness(1.3) drop-shadow(0 0 40px var(--acc)); }
}

@keyframes logoPulseBg {
0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0.2; }
}

.login-title {
font-size: 4rem;
font-weight: 900;
background: var(--grad);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
margin-bottom: 10px;
animation: gradientFlow 2s ease infinite, titleSlideIn 1s ease-out 0.3s both;
position: relative;
}

.login-title::after {
content: '';
position: absolute;
bottom: -10px;
left: 50%;
transform: translateX(-50%);
width: 0;
height: 3px;
background: var(--grad);
animation: titleUnderline 1s ease 1s forwards;
border-radius: 10px;
}

@keyframes titleSlideIn {
0% { transform: translateY(30px); opacity: 0; }
100% { transform: translateY(0); opacity: 1; }
}

@keyframes titleUnderline {
0% { width: 0; }
100% { width: 80%; }
}

.login-subtitle {
font-size: 1.5rem;
color: var(--txt);
opacity: 0;
letter-spacing: 6px;
margin-bottom: 40px;
animation: subtitleFadeIn 1s ease 0.8s forwards;
text-transform: uppercase;
font-weight: 700;
}

@keyframes subtitleFadeIn {
0% { opacity: 0; transform: translateY(10px); }
100% { opacity: 0.8; transform: translateY(0); }
}

.login-progress {
width: 300px;
height: 6px;
background: rgba(255,255,255,0.1);
border-radius: 10px;
margin: 0 auto;
overflow: hidden;
position: relative;
box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

.login-progress::before {
content: '';
position: absolute;
top: 0;
left: -100%;
width: 100%;
height: 100%;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
animation: progressShine 2s ease-in-out infinite;
}

.login-progress-bar {
height: 100%;
background: var(--grad);
width: 0%;
animation: progressLoad 5s ease-in-out forwards;
border-radius: 10px;
position: relative;
box-shadow: 0 0 15px var(--acc);
}

.login-progress-bar::after {
content: '';
position: absolute;
right: 0;
top: 0;
width: 20px;
height: 100%;
background: inherit;
filter: blur(8px);
animation: progressGlow 1s ease-in-out infinite alternate;
}

@keyframes progressShine {
0% { left: -100%; }
100% { left: 100%; }
}

@keyframes progressGlow {
0% { opacity: 0.5; }
100% { opacity: 1; }
}

@keyframes loginZoomIn {
0% { transform: scale(0) rotate(-180deg); opacity: 0; }
50% { transform: scale(1.2) rotate(10deg); }
75% { transform: scale(0.9) rotate(-5deg); }
100% { transform: scale(1) rotate(0deg); opacity: 1; }
}

@keyframes progressLoad {
0% { width: 0%; box-shadow: 0 0 5px var(--acc); }
10% { width: 15%; box-shadow: 0 0 15px var(--acc); }
25% { width: 35%; }
40% { width: 50%; box-shadow: 0 0 20px var(--acc); }
60% { width: 65%; }
75% { width: 80%; }
90% { width: 92%; }
100% { width: 100%; box-shadow: 0 0 30px var(--acc); }
}

@keyframes gradientFlow {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

@keyframes loginFadeOut {
0% { opacity: 1; transform: scale(1); }
50% { opacity: 0.8; transform: scale(1.1); }
100% { opacity: 0; transform: scale(1.5); visibility: hidden; pointer-events: none; }
}

.login-loading {
display: flex;
justify-content: center;
gap: 8px;
margin-top: 20px;
}

.login-loading span {
width: 10px;
height: 10px;
background: var(--acc);
border-radius: 50%;
animation: loadingDot 1.4s ease-in-out infinite;
box-shadow: 0 0 10px var(--acc);
}

.login-loading span:nth-child(2) { animation-delay: 0.2s; }
.login-loading span:nth-child(3) { animation-delay: 0.4s; }

@keyframes loadingDot {
0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
40% { transform: scale(1); opacity: 1; }
}

/* Prevenir zoom acidental em inputs */
@media (max-width: 768px) {
    input, select, textarea {
        font-size: 16px !important; /* Previne zoom em iOS */
    }
}
</style>
</head>

<script>
const DB_KEY = 'titan_vault_db_v19';
const TXT_KEY = 'titan_txt_db_v19';
const NOTES_KEY = 'titan_notes_v19';
let myChart = null;
let currentFilter = 'all';
let currentTab = 'tab-vault';
let audioCtx = null;
let noiseNode = null;
let openTxtId = null;

// --- NEBULA ENGINE ---
const canvas = document.getElementById('nebula-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function initNebula() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for(let i = 0; i < 200; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speed: Math.random() * 0.3 + 0.1,
            opacity: Math.random() * 0.8 + 0.2,
            hue: 0
        });
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const accent = getComputedStyle(document.body).getPropertyValue('--acc').trim();
    
    particles.forEach(p => {
        p.y -= p.speed;
        p.x += Math.sin(p.y / 80) * 0.2;
        
        if(p.y < 0) {
            p.y = canvas.height;
            p.x = Math.random() * canvas.width;
        }
        
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = accent;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        
        // Glow effect
        ctx.globalAlpha = p.opacity * 0.3;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
        ctx.fill();
    });
    
    requestAnimationFrame(animate);
}

// --- TOAST NOTIFICATIONS ---
function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message}`;
    container.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'slideInRight 0.3s ease reverse';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

// --- TAB SYSTEM ---
function switchTab(id) {
    currentTab = id;
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    document.getElementById('btn-vault').classList.toggle('active', id === 'tab-vault');
    document.getElementById('btn-docs').classList.toggle('active', id === 'tab-docs');
    
    if(id === 'tab-docs') loadTxtLibrary();
    else load();
    
    showToast(id === 'tab-vault' ? '📂 Cofre de Links' : '📄 Biblioteca de Documentos', 'info');
}

// --- TXT MANAGEMENT ---
function processTxtImport(e) {
    const file = e.target.files[0];
    if(!file) return;
    
    const reader = new FileReader();
    reader.onload = (ev) => {
        const db = JSON.parse(localStorage.getItem(TXT_KEY) || '[]');
        db.push({
            id: Date.now().toString(),
            name: file.name,
            content: ev.target.result,
            date: new Date().toLocaleString()
        });
        localStorage.setItem(TXT_KEY, JSON.stringify(db));
        addLog(`DOC IMPORTADO: ${file.name}`);
        showToast(`📄 "${file.name}" importado!`, 'success');
        switchTab('tab-docs');
    };
    reader.readAsText(file);
}

function loadTxtLibrary() {
    const db = JSON.parse(localStorage.getItem(TXT_KEY) || '[]');
    const container = document.getElementById('txt-list-container');
    
    if(db.length === 0) {
        container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 40px; opacity:0.5;">
            <i class="fas fa-folder-open" style="font-size: 4rem; margin-bottom: 15px;"></i>
            <p>Nenhum documento ainda</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Importe um arquivo .txt para começar</p>
        </div>`;
        return;
    }
    
    container.innerHTML = db.map(f => `
        <div class="txt-card" onclick="openTxtViewer('${f.id}')">
            <i class="fas fa-file-code"></i>
            <h5>${f.name}</h5>
            <p class="txt-meta">${f.date}</p>
            <button onclick="event.stopPropagation(); deleteTxt('${f.id}')" 
                style="margin-top:12px; background:none; border:none; color:#ff4757; cursor:pointer; font-weight:bold; font-size:0.65rem;">
                🗑️ ELIMINAR
            </button>
        </div>
    `).join('');
}

function openTxtViewer(id) {
    const db = JSON.parse(localStorage.getItem(TXT_KEY) || '[]');
    const file = db.find(f => f.id === id);
    if(file) {
        openTxtId = id;
        document.getElementById('current-txt-name').innerText = file.name;
        document.getElementById('txt-editor-area').value = file.content;
        document.getElementById('txt-viewer-overlay').style.display = 'flex';
        addLog(`VISUALIZANDO: ${file.name}`);
        showToast(`📄 ${file.name}`, 'info');
    }
}

function closeTxtViewer() {
    const content = document.getElementById('txt-editor-area').value;
    const db = JSON.parse(localStorage.getItem(TXT_KEY) || '[]');
    const idx = db.findIndex(f => f.id === openTxtId);
    
    if(idx !== -1) {
        db[idx].content = content;
        db[idx].date = new Date().toLocaleString();
        localStorage.setItem(TXT_KEY, JSON.stringify(db));
    }
    
    document.getElementById('txt-viewer-overlay').style.display = 'none';
    loadTxtLibrary();
    showToast('💾 Documento salvo!', 'success');
}

function saveAndDownloadTxt() {
    const content = document.getElementById('txt-editor-area').value;
    const name = document.getElementById('current-txt-name').innerText;
    const blob = new Blob([content], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    showToast(`⬇️ ${name} baixado!`, 'success');
}

function deleteTxt(id) {
    if(confirm("🗑️ DELETAR ESTE DOCUMENTO?")) {
        let db = JSON.parse(localStorage.getItem(TXT_KEY) || '[]');
        db = db.filter(f => f.id !== id);
        localStorage.setItem(TXT_KEY, JSON.stringify(db));
        loadTxtLibrary();
        showToast('🗑️ Documento eliminado!', 'success');
    }
}

// --- CORE VAULT ENGINE ---
function load() {
    const data = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    const term = document.getElementById('search-input').value.toLowerCase();
    
    document.getElementById('totalCounter').innerText = data.length;
    document.getElementById('storage-bar').style.width = Math.min(data.length * 2, 100) + '%';
    
    const filtered = data.filter(l => {
        const mSearch = l.title.toLowerCase().includes(term) || l.url.toLowerCase().includes(term);
        const mCat = currentFilter === 'all' || l.cat === currentFilter;
        return mSearch && mCat;
    });
    
    if(filtered.length === 0) {
        document.getElementById('list').innerHTML = `
            <div style="text-align:center; padding: 60px 20px; opacity:0.5;">
                <i class="fas fa-link" style="font-size: 4rem; margin-bottom: 20px;"></i>
                <p style="font-size: 1.1rem;">Nenhum link encontrado</p>
                <p style="font-size: 0.85rem; margin-top: 10px;">Adicione seu primeiro link acima! 🚀</p>
            </div>`;
    } else {
        document.getElementById('list').innerHTML = filtered.map(l => `
            <div class="item">
                <div class="item-info">
                    <h4>${l.title} <span style="font-size:0.55rem; background:var(--border); padding:3px 8px; border-radius:4px; margin-left:8px;">${l.cat}</span></h4>
                    <p>${l.url}</p>
                </div>
                <div style="display:flex; gap:15px; align-items:center;">
                    <i class="fas fa-external-link-alt" style="cursor:pointer; font-size:1.1rem;" onclick="window.open('${l.url}','_blank')" title="Abrir"></i>
                    <i class="fas fa-qrcode" style="cursor:pointer; font-size:1.1rem;" onclick="showQR('${l.url}')" title="QR Code"></i>
                    <button onclick="copyLink('${l.url}')" style="background:none; border:1px solid var(--acc); color:var(--acc); padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.65rem;" title="Copiar">📋</button>
                    <button onclick="del('${l.id}')" style="background:none; border:1px solid #ff4757; color:#ff4757; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.65rem;">🗑️</button>
                </div>
            </div>
        `).reverse().join('');
    }
    
    updateChart(data);
    renderFilters(data);
    document.getElementById('notes').value = localStorage.getItem(NOTES_KEY) || '';
}

function add() {
    const u = document.getElementById('u').value;
    if(!u) return showToast('⚠️ URL é obrigatória!', 'warning');
    
    const db = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
    db.push({
        id: Date.now().toString(),
        title: document.getElementById('t').value || 'Link sem Título',
        url: u.startsWith('http') ? u : 'https://' + u,
        cat: document.getElementById('c').value || 'Geral'
    });
    
    localStorage.setItem(DB_KEY, JSON.stringify(db));
    document.getElementById('t').value = '';
    document.getElementById('u').value = '';
    document.getElementById('c').value = '';
    
    addLog("➕ REGISTRO ADICIONADO");
    showToast('✅ Link adicionado ao Vault!', 'success');
    load();
}

function del(id) {
    if(confirm("🗑️ ELIMINAR ESTE REGISTRO?")) {
        let db = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
        db = db.filter(i => i.id !== id);
        localStorage.setItem(DB_KEY, JSON.stringify(db));
        showToast('🗑️ Link eliminado!', 'success');
        load();
    }
}

function copyLink(url) {
    navigator.clipboard.writeText(url);
    showToast('📋 Link copiado!', 'success');
}

// --- AUDIO & FOCUS ---
function toggleAmbientSound(active) {
    if(active) {
        try {
            if(!audioCtx) audioCtx = new AudioContext();
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for(let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            noiseNode = audioCtx.createBufferSource();
            noiseNode.buffer = buffer;
            noiseNode.loop = true;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 400;
            
            const gain = audioCtx.createGain();
            gain.gain.value = 0.03;
            
            noiseNode.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            noiseNode.start();
        } catch(e) {}
    } else if(noiseNode) {
        noiseNode.stop();
        noiseNode = null;
    }
}

function toggleFocus() {
    const isZen = document.body.classList.toggle('focus-mode');
    toggleAmbientSound(isZen);
    document.getElementById('main-title').innerText = isZen ? "🌙 TITAN ZEN" : "⚡ VAULT TITAN V19";
    showToast(isZen ? '🌙 Modo Zen ativado' : '⚡ Modo Normal', 'info');
}

// --- UTILITIES ---
function toggleSidebar() {
    const sidebar = document.getElementById('scrapbook');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('active');
    overlay.classList.toggle('active');
}

function addLog(msg) {
    const log = document.getElementById('access-log');
    log.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}<br>` + log.innerHTML;
}

function goHome() {
    currentFilter = 'all';
    document.getElementById('search-input').value = '';
    if(document.body.classList.contains('focus-mode')) toggleFocus();
    switchTab('tab-vault');
    showToast('🏠 Volta ao início', 'info');
}

function toggleSection(id) {
    const s = document.getElementById(id);
    s.style.display = (s.style.display === 'none' || s.style.display === '') ? 'block' : 'none';
}

function changeTheme(t) {
    document.body.className = t;
    load();
    showToast('🎨 Tema alterado!', 'success');
}

function saveNotes() {
    localStorage.setItem(NOTES_KEY, document.getElementById('notes').value);
}

function showQR(u) {
    const c = document.getElementById('qr-container');
    c.innerHTML = "";
    new QRCode(c, {text: u, width: 220, height: 220});
    document.getElementById('qr-modal').style.display = 'flex';
    showToast('📱 QR Code gerado!', 'info');
}

function playVideo() {
    const u = document.getElementById('v-url').value;
    const id = u.includes('v=') ? u.split('v=')[1].split('&')[0] : u.split('be/')[1];
    if(id) {
        document.getElementById('v-frame').src = `https://www.youtube.com/embed/${id}`;
        document.getElementById('player-wrap').style.display = 'block';
        showToast('▶️ Vídeo carregado!', 'success');
    }
}

function updateChart(data) {
    const cats = {};
    data.forEach(i => cats[i.cat] = (cats[i.cat] || 0) + 1);
    
    const ctxC = document.getElementById('mainChart').getContext('2d');
    if(myChart) myChart.destroy();
    
    myChart = new Chart(ctxC, {
        type: 'doughnut',
        data: {
            labels: Object.keys(cats),
            datasets: [{
                data: Object.values(cats),
                backgroundColor: [
                    '#00b4d8', '#ff007f', '#d4af37', '#e63946', '#39ff14',
                    '#7b68ee', '#ff6b35', '#00ff00', '#58a6ff'
                ],
                borderWidth: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: true, position: 'right', labels: { color: '#caf0f8', font: { size: 10 } } } }
        }
    });
}

function renderFilters(data) {
    const cats = ['all', ...new Set(data.map(l => l.cat))];
    document.getElementById('cat-list').innerHTML = cats.filter(c => c !== 'all').map(c => `<option value="${c}">`).join('');
    document.getElementById('filters').innerHTML = cats.map(c => `
        <button onclick="currentFilter='${c}';load()" class="btn-tool" 
            style="background:${currentFilter === c ? 'var(--acc)' : 'transparent'}; 
                   color:${currentFilter === c ? '#000' : 'var(--acc)'}">
            ${c === 'all' ? '📋 TODOS' : c}
        </button>
    `).join('');
}

function exportData() {
    const data = {
        links: localStorage.getItem(DB_KEY),
        docs: localStorage.getItem(TXT_KEY),
        notes: localStorage.getItem(NOTES_KEY)
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `TITAN_BACKUP_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    showToast('⬇️ Backup exportado!', 'success');
}

// --- KEYBOARD SHORTCUTS ---
document.addEventListener('keydown', (e) => {
    if(e.ctrlKey && e.key === 'n') {
        e.preventDefault();
        document.getElementById('t').focus();
    }
    if(e.ctrlKey && e.key === 'f') {
        e.preventDefault();
        document.getElementById('search-input').focus();
    }
    if(e.key === 'Escape') {
        if(document.getElementById('txt-viewer-overlay').style.display === 'flex') {
            closeTxtViewer();
        }
        if(document.getElementById('qr-modal').style.display === 'flex') {
            document.getElementById('qr-modal').style.display = 'none';
        }
    }
});

// --- INITIALIZATION ---
window.onload = () => {
    initNebula();
    animate();
    load();
    addLog("🚀 SISTEMA TITAN V19 INICIALIZADO");
    showToast('⚡ Vault Titan V19 pronto!', 'success');
};

window.onresize = initNebula;
</script>
